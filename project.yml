name: ShokuninWatchFace
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    watchOS: "10.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  ShokuninWatchFace:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ShokuninWatchFace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.shokuninwatchface
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: ShokuninWatchFace/Info.plist
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
    info:
      path: ShokuninWatchFace/Info.plist
      properties:
        CFBundleName: 職人ウォッチフェイス
        CFBundleDisplayName: 職人ウォッチフェイス
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleIconName: AppIcon
        WKApplication: true
        NSMotionUsageDescription: 角度計と水平器のためにモーションセンサーを使用します。

  ShokuninComplications:
    type: appExtension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Complications
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.shokuninwatchface.complications
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - target: ShokuninWatchFace
        embed: false
