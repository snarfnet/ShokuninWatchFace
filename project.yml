name: ShokuninWatchFace
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    watchOS: "10.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  ShokuninWatchFace:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ShokuninWatchFace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.shokuninwatchface
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: 職人ウォッチフェイス
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_NSMotionUsageDescription: 角度計と水平器のためにモーションセンサーを使用します。
