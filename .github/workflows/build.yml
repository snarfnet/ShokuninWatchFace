name: Build and Upload to App Store

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode 26
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
        fi
        echo "Using Xcode: $(xcode-select -p)"
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=${{ github.run_number }}
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i '' "s/CURRENT_PROJECT_VERSION: 1/CURRENT_PROJECT_VERSION: $BUILD_NUM/g" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Import Distribution Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
      run: |
        CERT_PATH=$RUNNER_TEMP/certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH
        security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
        security list-keychains -d user -s $KEYCHAIN_PATH

    - name: Set up ASC API Key
      env:
        ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/private_keys
        echo -n "$ASC_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project ShokuninWatchFace.xcodeproj \
          -scheme ShokuninWatchFace \
          -destination "generic/platform=watchOS" \
          -archivePath $RUNNER_TEMP/ShokuninWatchFace.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH

    - name: Upload to App Store
      run: |
        ARCHIVE=$RUNNER_TEMP/ShokuninWatchFace.xcarchive

        # Restore login keychain to search list (cert import step removed it)
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

        # Export IPA with release-testing method
        cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>release-testing</string>
            <key>teamID</key>
            <string>83VGKGSQUH</string>
            <key>destination</key>
            <string>export</string>
        </dict>
        </plist>
        PLIST

        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE" \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

        IPA=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
        echo "=== IPA: $IPA ($(stat -f%z "$IPA") bytes) ==="

        # Copy to ASCII filename to avoid potential encoding issues
        cp "$IPA" $RUNNER_TEMP/ShokuninWatchFace.ipa
        IPA=$RUNNER_TEMP/ShokuninWatchFace.ipa

        # altool can't detect watchOS platform - likely because DTPlatformName
        # is missing from the IPA's Info.plist after release-testing export.
        # Inject platform metadata into the IPA if needed, then upload.

        echo "=== Checking IPA platform metadata ==="
        mkdir -p $RUNNER_TEMP/ipa_fix
        cd $RUNNER_TEMP/ipa_fix
        unzip -o "$IPA"
        APP_PLIST="Payload/ShokuninWatchFace.app/Info.plist"

        # Show current platform fields
        echo "=== Current Info.plist platform fields ==="
        /usr/libexec/PlistBuddy -c "Print :DTPlatformName" "$APP_PLIST" 2>&1 || echo "DTPlatformName: MISSING"
        /usr/libexec/PlistBuddy -c "Print :DTSDKName" "$APP_PLIST" 2>&1 || echo "DTSDKName: MISSING"
        /usr/libexec/PlistBuddy -c "Print :UIDeviceFamily" "$APP_PLIST" 2>&1 || echo "UIDeviceFamily: MISSING"
        /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$APP_PLIST" 2>&1 || echo "MinimumOSVersion: MISSING"
        /usr/libexec/PlistBuddy -c "Print :WKApplication" "$APP_PLIST" 2>&1 || echo "WKApplication: MISSING"

        # Add DTPlatformName if missing (required for altool platform detection)
        /usr/libexec/PlistBuddy -c "Print :DTPlatformName" "$APP_PLIST" 2>/dev/null || {
          echo "=== Injecting watchOS platform metadata ==="
          /usr/libexec/PlistBuddy -c "Add :DTPlatformName string watchos" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :DTPlatformVersion string 11.0" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Add :DTSDKName string watchos11.0" "$APP_PLIST"
          # Re-create IPA
          rm "$IPA"
          zip -r "$IPA" Payload/
          echo "=== IPA rebuilt with platform metadata ==="
        }
        cd $RUNNER_TEMP

        # Now try altool upload (should auto-detect watchOS platform)
        xcrun altool --upload-app \
          -f "$IPA" \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec \
          --verbose 2>&1

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Submit for Review
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
